name: Nix Check
description: Run Nix Flake Checks
inputs:
  system:
    description: "System to check"
    required: true
runs:
  using: "composite"
  steps:
    - name: Install Nix
      if: inputs.system != 'riscv64-linux'
      uses: DeterminateSystems/nix-installer-action@v22

    - name: Add stub sudo (riscv64)
      if: inputs.system == 'riscv64-linux'
      shell: bash
      run: |
        printf '#!/bin/sh\nexec "$@"\n' > /usr/local/bin/sudo
        chmod +x /usr/local/bin/sudo
        mkdir -m 0755 /nix

    - name: Install Nix (riscv64)
      if: inputs.system == 'riscv64-linux'
      uses: cachix/install-nix-action@v31
      with:
        nix_path: nixpkgs=channel:nixos-unstable
        extra_nix_config: |
          filter-syscalls = false
          sandbox = false

    - name: Magic Nix Cache
      if: github.server_url == 'https://github.com' && inputs.system != 'riscv64-linux'
      uses: DeterminateSystems/magic-nix-cache-action@v13

    - name: Proteus' Nix Cache
      if: github.server_url != 'https://github.com'
      shell: bash
      run: |
        sed -i -e 's|^\(extra-substituters\ = \)|\1https://s3.proteus.eu.org/nix-cache/ |' \
        -e 's|^\(extra-trusted-public-keys\ =\ \)|\1s3.proteus.eu.org-1:IxrRwk4uC5ittHeG9menkuajABnrX9cboEWwZz/m4+E= |' \
        /etc/nix/nix.conf

    - name: Run nix flake check
      shell: bash
      run: |
        # nix-fast-build depends on a Haskell package chain (`ansi-terminal` -> `hadrian` -> `ghc`)
        if [ "${{ inputs.system }}" = "riscv64-linux" ]; then
          nix build \
            --no-link \
            --print-build-logs \
            "./#checks.${{ inputs.system }}.mylib_tests"
        else
          nix run \
            --inputs-from . \
            nixpkgs#nix-fast-build -- \
            --skip-cached --no-nom \
            --flake "./#checks.${{ inputs.system }}.mylib_tests"
        fi
